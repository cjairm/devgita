name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Build binaries
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
          COMMIT: ${{ github.sha }}
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHORT_COMMIT=$(echo "$COMMIT" | cut -c1-7)
          LDFLAGS="-s -w \
            -X 'github.com/cjairm/devgita/cmd.Version=${VERSION}' \
            -X 'github.com/cjairm/devgita/cmd.Commit=${SHORT_COMMIT}' \
            -X 'github.com/cjairm/devgita/cmd.BuildDate=${BUILD_DATE}'"

          GOOS=darwin  GOARCH=amd64 go build -o devgita-darwin-amd64  -ldflags="$LDFLAGS" .
          GOOS=darwin  GOARCH=arm64 go build -o devgita-darwin-arm64  -ldflags="$LDFLAGS" .
          GOOS=linux   GOARCH=amd64 go build -o devgita-linux-amd64   -ldflags="$LDFLAGS" .
          GOOS=linux   GOARCH=arm64 go build -o devgita-linux-arm64   -ldflags="$LDFLAGS" .

          chmod +x devgita-*
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            devgita-darwin-amd64
            devgita-darwin-arm64
            devgita-linux-amd64
            devgita-linux-arm64
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
